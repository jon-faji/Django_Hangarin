{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
	<title>Hangarin - Confirm Sign In</title>
	<link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
	<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
	<style>
		body {
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			font-family: 'Nunito', sans-serif;
		}
		.auth-card {
			max-width: 400px;
			width: 100%;
			background: #fff;
			border-radius: 12px;
			box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
			padding: 2.5rem;
			text-align: center;
		}
		.auth-card h3 {
			color: #333;
			font-weight: 700;
			margin-bottom: 1.5rem;
		}
		.auth-card p {
			color: #666;
			margin-bottom: 1rem;
			line-height: 1.6;
		}
		.provider-icon {
			font-size: 3rem;
			color: #667eea;
			margin: 1rem 0;
		}
		.provider-name {
			font-weight: 700;
			color: #667eea;
		}
		.button-group {
			display: flex;
			gap: 1rem;
			margin-top: 2rem;
		}
		.btn {
			flex: 1;
			padding: 0.75rem;
			border: none;
			border-radius: 6px;
			font-size: 1rem;
			font-weight: 600;
			cursor: pointer;
			transition: all 0.3s ease;
			text-decoration: none;
			display: inline-block;
		}
		.btn-primary {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
		}
		.btn-primary:hover {
			transform: translateY(-2px);
			box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
			color: white;
		}
		.btn-secondary {
			background: #f0f0f0;
			color: #333;
			border: 2px solid #e0e0e0;
		}
		.btn-secondary:hover {
			background: #e8e8e8;
			color: #333;
		}
		form {
			display: contents;
		}
		button[type="submit"] {
			margin: 0;
		}
	</style>
</head>
<body>
	<div class="auth-card">
		<h3>Confirm Sign In</h3>

		{% if provider.name %}
			<div class="provider-icon">
				<i class="fas fa-sign-in-alt"></i>
			</div>

			<p>
				You are about to sign in using your
				<span class="provider-name">{{ provider.name }}</span> account.
			</p>
		{% else %}
			<p>Please confirm to continue.</p>
		{% endif %}

		<div class="button-group">
			<form method="post" style="display: contents;">
				{% csrf_token %}
				<button type="submit" class="btn btn-primary">
					{% if provider.name %}
						Continue with {{ provider.name }}
					{% else %}
						Continue
					{% endif %}
				</button>
			</form>
			<a href="{% url 'account_login' %}" class="btn btn-secondary">Cancel</a>
		</div>
	</div>
</body>
</html>
