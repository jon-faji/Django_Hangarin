{% extends 'base.html' %}
{% load static %}

{% block title %}Delete Note - Hangarin{% endblock %}

{% block content %}
<h4 class="page-title">Delete Note</h4>

<div class="row">
	<div class="col-md-8">
		<div class="card">
			<div class="card-header">
				<div class="card-title">Delete Note</div>
				<div class="card-category">Confirm deletion</div>
			</div>

			<div class="card-body">
				<form action="" method="post" novalidate>
					{% csrf_token %}
					<p class="alert alert-warning"><strong>Warning:</strong> Are you sure you want to delete this note?</p>
					<p>This action cannot be undone.</p>
					
					<div class="form-group">
						<button type="submit" class="btn btn-danger btn-rounded">Yes, Delete Note</button>
						<a href="{% url 'note_list' %}" class="btn btn-secondary btn-rounded">Cancel</a>
					</div>
				</form>
			</div>
		</div>
	</div>
</div>
{% endblock %}
