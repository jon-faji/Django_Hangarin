{% load socialaccount %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Hangarin - Sign In</title>
    
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f172a; /* Dark sleek background */
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
        }

        .auth-card {
            max-width: 450px;
            width: 90%;
            background: var(--glass-bg);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            padding: 3rem 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .form-logo h2 {
            font-size: 2rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-weight: 400;
        }

        /* Modern Social Login */
        .social-login a {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            gap: 10px;
        }

        .social-login a:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
            transform: translateY(-1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: #cbd5e1;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }

        .divider span {
            padding: 0 10px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Floating-like Inputs */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fcfdfe;
        }

        .form-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background: #fff;
        }

        /* Primary Button */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
            margin-top: 1rem;
        }

        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
        }

        .signup-link a {
            color: #6366f1;
            text-decoration: none;
            font-weight: 700;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .alert-danger {
            background: #fff1f2;
            color: #be123c;
            border: none;
            border-left: 4px solid #be123c;
            border-radius: 8px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="form-logo text-center">
            <h2>Hangarin</h2>
            <p class="subtitle mb-4">Streamline your productivity.</p>
        </div>

        <div class="social-login">
            <a href="{% provider_login_url 'google' %}">
                <img src="{% static 'img/google-logo.png' %}" width="18" alt="Google">
                Continue with Google
            </a>
        </div>

        <div class="divider">
            <span>or sign in with email</span>
        </div>

        <form method="post" action="{% url 'account_login' %}">
            {% csrf_token %}

            {% if form.errors %}
                <div class="alert alert-danger p-3 mb-4">
                    <i class="fas fa-exclamation-circle me-2"></i> Access denied. Please check credentials.
                </div>
            {% endif %}

            <div class="form-group">
                <label for="id_login">Email or Username</label>
                <input type="text" name="login" id="id_login" placeholder="e.g. alex@example.com" required />
            </div>

            <div class="form-group">
                <div class="d-flex justify-content-between align-items-center">
                    <label for="id_password" class="mb-0">Password</label>
                    <a href="{% url 'account_reset_password' %}" class="text-muted" style="font-size: 0.75rem; text-decoration: none;">Forgot password?</a>
                </div>
                <input type="password" name="password" id="id_password" placeholder="••••••••" required class="mt-2" />
            </div>

            <div class="form-check mb-4">
                <input type="checkbox" name="remember" id="id_remember" class="form-check-input">
                <label class="form-check-label ms-1 subtitle" for="id_remember">Keep me signed in</label>
            </div>

            <button type="submit" class="btn-login">
                Sign Into Account <i class="fas fa-arrow-right ms-2"></i>
            </button>
        </form>

        <div class="signup-link">
            <span class="text-muted">New here?</span> 
            <a href="{% url 'account_signup' %}">Create an account</a>
        </div>
    </div>
</body>
</html>
